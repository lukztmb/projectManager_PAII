version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sinTecladosDB
      POSTGRES_USER: sinTeclados
      POSTGRES_PASSWORD: sinTeclados
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sinTecladosDB
      SPRING_DATASOURCE_USERNAME: sinTeclados
      SPRING_DATASOURCE_PASSWORD: sinTeclados
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db

volumes:
  postgres_data:
